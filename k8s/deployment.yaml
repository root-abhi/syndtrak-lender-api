apiVersion: apps/v1
kind: Deployment
metadata:
  name: lender-api
  namespace: lender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lender-api
  template:
    metadata:
      labels:
        app: lender-api
    spec:
      containers:
        - name: lender-api
          image: 021558411440.dkr.ecr.ap-south-1.amazonaws.com/syndtrak/lender-api:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              value: "syndtrak-jwt-secret-2024"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
